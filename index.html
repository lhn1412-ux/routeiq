<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RouteIQ — 부산 물류 경로 최적화</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=Noto+Sans+KR:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2332;
    --border: #1e2d42;
    --accent: #00d4ff;
    --accent2: #ff6b35;
    --green: #00e5a0;
    --red: #ff4757;
    --text: #e8edf5;
    --muted: #5a6a7e;
    --card-bg: rgba(17,24,39,0.8);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,212,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,212,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  /* Glowing orbs */
  body::after {
    content: '';
    position: fixed;
    top: -200px; right: -200px;
    width: 600px; height: 600px;
    background: radial-gradient(circle, rgba(0,212,255,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  .orb2 {
    position: fixed;
    bottom: -150px; left: -150px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(255,107,53,0.05) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* Header */
  header {
    position: relative; z-index: 10;
    padding: 20px 40px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    backdrop-filter: blur(10px);
    background: rgba(10,14,26,0.8);
  }

  .logo {
    font-family: 'Syne', sans-serif;
    font-weight: 800;
    font-size: 1.5rem;
    letter-spacing: -0.02em;
  }

  .logo span { color: var(--accent); }

  .badge {
    background: rgba(0,212,255,0.1);
    border: 1px solid rgba(0,212,255,0.3);
    color: var(--accent);
    padding: 4px 12px;
    border-radius: 20px;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    text-transform: uppercase;
  }

  .header-stats {
    display: flex;
    gap: 32px;
  }

  .hstat {
    text-align: center;
  }

  .hstat-val {
    font-family: 'Syne', sans-serif;
    font-size: 1.1rem;
    font-weight: 700;
    color: var(--accent);
  }

  .hstat-label {
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  /* Main layout */
  main {
    position: relative; z-index: 5;
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 24px 80px;
  }

  .hero {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeUp 0.6s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .hero-tag {
    display: inline-block;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--accent2);
    margin-bottom: 12px;
  }

  .hero h1 {
    font-family: 'Syne', sans-serif;
    font-size: clamp(2rem, 4vw, 3rem);
    font-weight: 800;
    line-height: 1.1;
    letter-spacing: -0.03em;
    margin-bottom: 12px;
  }

  .hero h1 .hl { color: var(--accent); }

  .hero p {
    color: var(--muted);
    font-size: 0.95rem;
    max-width: 480px;
    margin: 0 auto;
    line-height: 1.6;
  }

  /* Two-column layout */
  .layout {
    display: grid;
    grid-template-columns: 380px 1fr;
    gap: 24px;
    align-items: start;
  }

  @media (max-width: 900px) {
    .layout { grid-template-columns: 1fr; }
  }

  /* Panel */
  .panel {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 16px;
    backdrop-filter: blur(20px);
    overflow: hidden;
  }

  .panel-header {
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .panel-icon {
    width: 32px; height: 32px;
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1rem;
  }

  .panel-icon.blue { background: rgba(0,212,255,0.12); }
  .panel-icon.orange { background: rgba(255,107,53,0.12); }

  .panel-title {
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    font-weight: 700;
    letter-spacing: 0.01em;
  }

  .panel-body { padding: 20px 24px; }

  /* Location list */
  .location-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 8px;
    margin-bottom: 16px;
  }

  .location-item {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    cursor: grab;
    transition: all 0.2s;
    animation: slideIn 0.3s ease both;
  }

  @keyframes slideIn {
    from { opacity: 0; transform: translateX(-10px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .location-item:hover {
    border-color: rgba(0,212,255,0.3);
    background: rgba(0,212,255,0.04);
  }

  .location-item.dragging {
    opacity: 0.4;
    cursor: grabbing;
  }

  .loc-num {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: rgba(0,212,255,0.15);
    border: 1px solid rgba(0,212,255,0.3);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem;
    font-weight: 700;
    color: var(--accent);
    flex-shrink: 0;
  }

  .loc-info { flex: 1; }

  .loc-name {
    font-size: 0.85rem;
    font-weight: 500;
    color: var(--text);
  }

  .loc-sub {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 1px;
  }

  .loc-type {
    font-size: 0.65rem;
    padding: 2px 8px;
    border-radius: 10px;
    font-weight: 500;
  }

  .loc-type.depot {
    background: rgba(255,107,53,0.15);
    color: var(--accent2);
    border: 1px solid rgba(255,107,53,0.3);
  }

  .loc-type.stop {
    background: rgba(0,212,255,0.1);
    color: var(--accent);
    border: 1px solid rgba(0,212,255,0.2);
  }

  .loc-remove {
    background: none;
    border: none;
    color: var(--muted);
    cursor: pointer;
    font-size: 1rem;
    padding: 2px 4px;
    line-height: 1;
    transition: color 0.2s;
  }

  .loc-remove:hover { color: var(--red); }

  /* Add location form */
  .add-form {
    display: flex;
    gap: 8px;
  }

  .loc-select {
    flex: 1;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 14px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.82rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .loc-select:focus { border-color: var(--accent); }
  .loc-select option { background: var(--surface); }

  .btn {
    padding: 10px 16px;
    border-radius: 8px;
    border: none;
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.82rem;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .btn-ghost {
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--text);
  }

  .btn-ghost:hover {
    border-color: var(--accent);
    color: var(--accent);
  }

  .btn-primary {
    background: var(--accent);
    color: var(--bg);
    font-weight: 700;
    letter-spacing: 0.02em;
  }

  .btn-primary:hover {
    background: #33dbff;
    transform: translateY(-1px);
    box-shadow: 0 4px 20px rgba(0,212,255,0.25);
  }

  .btn-primary:active { transform: translateY(0); }

  .btn-run {
    width: 100%;
    margin-top: 16px;
    padding: 14px;
    font-size: 0.9rem;
    font-weight: 700;
    background: linear-gradient(135deg, var(--accent) 0%, #0099cc 100%);
    color: var(--bg);
    border-radius: 10px;
    position: relative;
    overflow: hidden;
  }

  .btn-run::before {
    content: '';
    position: absolute;
    top: 0; left: -100%;
    width: 100%; height: 100%;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
    transition: left 0.5s;
  }

  .btn-run:hover::before { left: 100%; }

  /* Vehicle config */
  .config-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
  }

  .config-item label {
    display: block;
    font-size: 0.68rem;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
    margin-bottom: 5px;
  }

  .config-item input, .config-item select {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 8px 12px;
    color: var(--text);
    font-family: 'Noto Sans KR', sans-serif;
    font-size: 0.82rem;
    outline: none;
    transition: border-color 0.2s;
  }

  .config-item input:focus,
  .config-item select:focus { border-color: var(--accent); }

  /* Results area */
  .results-area {
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .empty-state {
    text-align: center;
    padding: 60px 24px;
    color: var(--muted);
  }

  .empty-icon {
    font-size: 3rem;
    margin-bottom: 12px;
    opacity: 0.4;
  }

  .empty-state p {
    font-size: 0.85rem;
    line-height: 1.6;
  }

  /* KPI cards */
  .kpi-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 12px;
  }

  .kpi-card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 18px;
    position: relative;
    overflow: hidden;
    animation: popIn 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
  }

  @keyframes popIn {
    from { opacity: 0; transform: scale(0.9); }
    to { opacity: 1; transform: scale(1); }
  }

  .kpi-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), transparent);
  }

  .kpi-card.green::before { background: linear-gradient(90deg, var(--green), transparent); }
  .kpi-card.orange::before { background: linear-gradient(90deg, var(--accent2), transparent); }

  .kpi-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 8px;
  }

  .kpi-value {
    font-family: 'Syne', sans-serif;
    font-size: 1.8rem;
    font-weight: 800;
    line-height: 1;
    margin-bottom: 4px;
  }

  .kpi-value.blue { color: var(--accent); }
  .kpi-value.green { color: var(--green); }
  .kpi-value.orange { color: var(--accent2); }

  .kpi-sub {
    font-size: 0.72rem;
    color: var(--muted);
  }

  .kpi-change {
    display: inline-flex;
    align-items: center;
    gap: 3px;
    font-size: 0.72rem;
    font-weight: 600;
    color: var(--green);
    background: rgba(0,229,160,0.1);
    padding: 2px 7px;
    border-radius: 10px;
    margin-top: 5px;
  }

  /* Comparison table */
  .compare-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.82rem;
  }

  .compare-table thead tr {
    border-bottom: 2px solid var(--border);
  }

  .compare-table th {
    padding: 10px 14px;
    text-align: left;
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    font-weight: 500;
  }

  .compare-table th.center { text-align: center; }

  .compare-table td {
    padding: 12px 14px;
    border-bottom: 1px solid rgba(30,45,66,0.6);
    vertical-align: middle;
  }

  .compare-table tr:last-child td { border-bottom: none; }

  .compare-table tr:hover td {
    background: rgba(0,212,255,0.02);
  }

  .route-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 0.7rem;
    font-weight: 600;
    padding: 3px 10px;
    border-radius: 12px;
  }

  .route-badge.old {
    background: rgba(255,71,87,0.1);
    color: var(--red);
    border: 1px solid rgba(255,71,87,0.2);
  }

  .route-badge.new {
    background: rgba(0,229,160,0.1);
    color: var(--green);
    border: 1px solid rgba(0,229,160,0.2);
  }

  .route-stops {
    display: flex;
    align-items: center;
    flex-wrap: wrap;
    gap: 4px;
  }

  .stop-chip {
    font-size: 0.68rem;
    padding: 2px 8px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
  }

  .stop-chip.depot {
    background: rgba(255,107,53,0.1);
    border-color: rgba(255,107,53,0.3);
    color: var(--accent2);
  }

  .arrow {
    color: var(--muted);
    font-size: 0.7rem;
  }

  .saving-cell {
    color: var(--green);
    font-weight: 700;
    font-size: 0.85rem;
  }

  .diff-negative {
    color: var(--red);
    font-size: 0.72rem;
  }

  .diff-positive {
    color: var(--green);
    font-size: 0.72rem;
  }

  /* Monthly savings */
  .savings-banner {
    background: linear-gradient(135deg, rgba(0,229,160,0.08) 0%, rgba(0,212,255,0.05) 100%);
    border: 1px solid rgba(0,229,160,0.2);
    border-radius: 14px;
    padding: 24px;
    display: flex;
    align-items: center;
    gap: 24px;
    animation: fadeUp 0.5s ease 0.2s both;
  }

  .savings-icon {
    width: 56px; height: 56px;
    background: rgba(0,229,160,0.12);
    border-radius: 14px;
    display: flex; align-items: center; justify-content: center;
    font-size: 1.6rem;
    flex-shrink: 0;
  }

  .savings-label {
    font-size: 0.7rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 4px;
  }

  .savings-value {
    font-family: 'Syne', sans-serif;
    font-size: 2.2rem;
    font-weight: 800;
    color: var(--green);
    line-height: 1;
    margin-bottom: 4px;
  }

  .savings-desc {
    font-size: 0.78rem;
    color: var(--muted);
    line-height: 1.4;
  }

  .savings-breakdown {
    margin-left: auto;
    text-align: right;
    display: grid;
    gap: 8px;
  }

  .sbreak-item {
    font-size: 0.78rem;
  }

  .sbreak-item .val {
    font-weight: 700;
    color: var(--green);
  }

  .sbreak-item .lbl {
    color: var(--muted);
    margin-left: 6px;
  }

  /* Route visualizer */
  .route-viz {
    padding: 16px 0 4px;
  }

  .viz-label {
    font-size: 0.65rem;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .viz-track {
    display: flex;
    align-items: center;
    flex-wrap: nowrap;
    overflow-x: auto;
    gap: 0;
    padding-bottom: 4px;
  }

  .viz-node {
    display: flex;
    flex-direction: column;
    align-items: center;
    flex-shrink: 0;
  }

  .viz-dot {
    width: 36px; height: 36px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.65rem;
    font-weight: 700;
    margin-bottom: 4px;
    position: relative;
  }

  .viz-dot.depot {
    background: rgba(255,107,53,0.2);
    border: 2px solid var(--accent2);
    color: var(--accent2);
  }

  .viz-dot.stop {
    background: rgba(0,212,255,0.12);
    border: 2px solid rgba(0,212,255,0.4);
    color: var(--accent);
  }

  .viz-name {
    font-size: 0.62rem;
    color: var(--muted);
    max-width: 52px;
    text-align: center;
    line-height: 1.2;
  }

  .viz-line {
    flex: 1;
    height: 2px;
    min-width: 20px;
    background: linear-gradient(90deg, rgba(0,212,255,0.4), rgba(0,212,255,0.15));
    margin-bottom: 20px;
    position: relative;
    flex-shrink: 0;
  }

  .viz-line::after {
    content: '';
    position: absolute;
    right: -4px; top: -3px;
    width: 0; height: 0;
    border-top: 4px solid transparent;
    border-bottom: 4px solid transparent;
    border-left: 6px solid rgba(0,212,255,0.5);
  }

  /* Loading */
  .loading-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,14,26,0.85);
    z-index: 100;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 16px;
    backdrop-filter: blur(4px);
  }

  .loading-overlay.active { display: flex; }

  .loader {
    width: 48px; height: 48px;
    border: 3px solid rgba(0,212,255,0.15);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: 'Syne', sans-serif;
    font-size: 0.9rem;
    color: var(--muted);
    letter-spacing: 0.05em;
  }

  /* ── Section 1: Optimal path steps ── */
  .opt-path {
    display: flex;
    flex-direction: column;
  }

  .opt-step {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 11px 16px;
    transition: border-color 0.2s;
  }

  .opt-step.first {
    border-color: rgba(0,212,255,0.35);
    background: rgba(0,212,255,0.04);
  }

  .opt-step:hover { border-color: rgba(0,212,255,0.25); }

  .opt-bubble {
    width: 30px; height: 30px;
    border-radius: 50%;
    background: rgba(0,212,255,0.12);
    border: 2px solid rgba(0,212,255,0.35);
    color: var(--accent);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.7rem;
    font-weight: 700;
    flex-shrink: 0;
  }

  .opt-step-info { flex: 1; }

  .opt-step-name {
    font-size: 0.88rem;
    font-weight: 600;
    color: var(--text);
  }

  .opt-step-sub {
    font-size: 0.7rem;
    color: var(--muted);
    margin-top: 1px;
  }

  .opt-connector {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 0 14px;
    height: 28px;
  }

  .opt-line {
    width: 2px;
    height: 100%;
    border-left: 2px dashed rgba(0,212,255,0.2);
    margin-left: 13px; /* align with bubble center */
  }

  .opt-dist {
    font-size: 0.68rem;
    color: var(--muted);
    margin-left: 26px;
    background: var(--surface2);
    padding: 2px 8px;
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  /* Info pills */
  .info-pill {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 0.73rem;
    padding: 5px 12px;
    border-radius: 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: var(--muted);
  }

  .info-pill strong { color: var(--text); }
  .info-pill.blue { border-color: rgba(0,212,255,0.25); color: var(--accent); }
  .info-pill.blue strong { color: var(--accent); }
  .info-pill.green { border-color: rgba(0,229,160,0.25); color: var(--green); }
  .info-pill.green strong { color: var(--green); }

  /* ── Section 2: Compare routes ── */
  .compare-routes {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
  }

  .cr-row {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    flex-wrap: wrap;
  }

  .cr-label { flex-shrink: 0; padding-top: 2px; }

  .cr-stops {
    display: flex;

// ─── Distance lookup: road matrix first, Haversine fallback ─────────────────
function dist(a, b) {
  if (ROAD[a] && ROAD[a][b] != null) return ROAD[a][b];
  // Haversine × road factor 1.42
  const la = LOCATIONS[a], lb = LOCATIONS[b];
  const R = 6371, toRad = d => d * Math.PI / 180;
  const dLat = toRad(lb.lat - la.lat), dLng = toRad(lb.lng - la.lng);
  const h = Math.sin(dLat/2)**2 + Math.cos(toRad(la.lat)) * Math.cos(toRad(lb.lat)) * Math.sin(dLng/2)**2;
  return R * 2 * Math.asin(Math.sqrt(h)) * 1.42;
}

// ─── Distance helpers ────────────────────────────────────────────────────────
// 편도: A→B→C→...→Z  (표시용 — 기존/최적 모두 동일 기준)
function totalDistOneway(route) {
  let d = 0;
  for (let i = 0; i < route.length - 1; i++)
    d += dist(route[i], route[i + 1]);
  return d;
}

// 왕복(순환): A→B→...→Z→A  (TSP 내부 최적화용)
function totalDist(route) {
  return totalDistOneway(route) + dist(route[route.length - 1], route[0]);
}

// ─── TSP: nearest-neighbour seeded from best start + 2-opt improvement ───────
function nearestNeighbour(locs, startIdx) {
  const visited = new Set([startIdx]);
  const result = [locs[startIdx]];
  while (result.length < locs.length) {
    const last = result[result.length - 1];
    let best = -1, bestD = Infinity;
    locs.forEach((l, i) => {
      if (!visited.has(i)) {
        const d = dist(last, l);
        if (d < bestD) { bestD = d; best = i; }
      }
    });
    visited.add(best);
    result.push(locs[best]);
  }
  return result;
}

function twoOpt(route) {
  let improved = true;
  let best = [...route];
  while (improved) {
    improved = false;
    for (let i = 0; i < best.length - 1; i++) {
      for (let j = i + 2; j < best.length; j++) {
        if (j === best.length - 1 && i === 0) continue;
        // reverse segment [i+1..j]
        const candidate = [
          ...best.slice(0, i + 1),
          ...best.slice(i + 1, j + 1).reverse(),
          ...best.slice(j + 1)
        ];
        if (totalDist(candidate) < totalDist(best) - 0.001) {
          best = candidate;
          improved = true;
        }
      }
    }
  }
  return best;
}

function optimizeRoute(locs) {
  // Try NN from every start index, keep best, then apply 2-opt
  let bestRoute = null, bestDist = Infinity;
  locs.forEach((_, i) => {
    const candidate = nearestNeighbour(locs, i);
    const d = totalDist(candidate);
    if (d < bestDist) { bestDist = d; bestRoute = candidate; }
  });
  // 2-opt pass
  const improved = twoOpt(bestRoute);
  // Rotate so original depot (locs[0]) stays first
  const depot = locs[0];
  const idx = improved.indexOf(depot);
  return [...improved.slice(idx), ...improved.slice(0, idx)];
}

function addLocation() {
  const sel = document.getElementById('locationSelect');
  const val = sel.value;
  if (!val) return;
  if (selectedLocations.includes(val)) {
    sel.style.borderColor = 'var(--red)';
    setTimeout(() => sel.style.borderColor = '', 800);
    return;
  }
  selectedLocations.push(val);
  sel.value = '';
  renderList();
}

function removeLocation(i) {
  selectedLocations.splice(i, 1);
  renderList();
}

              <div class="hb-stat-val">₩${Math.round(yearly_all).toLocaleString()}</div>
            </div>
            <div style="font-size:0.68rem;color:var(--muted);text-align:right;line-height:1.4">
              월 ₩${Math.round(monthlySavingAll).toLocaleString()}<br>× 12개월
            </div>
          </div>
          <div class="hb-stat-item hb-highlight">
            <div class="hb-stat-icon">📆</div>
            <div style="flex:1">
              <div class="hb-stat-label">차량 ${vehicles}대 · <strong style="color:var(--green)">5년 누적 절감</strong></div>
              <div class="hb-stat-val" style="font-size:1.35rem">
                ₩${y5_all >= 100000000
                    ? (y5_all / 100000000).toFixed(2) + '억원'
                    : Math.round(y5_all / 10000).toLocaleString() + '만원'}
              </div>
            </div>
            <div style="font-size:0.68rem;color:rgba(0,229,160,0.6);text-align:right;line-height:1.4">
              연 ₩${Math.round(yearly_all / 10000).toLocaleString()}만<br>× 5년
            </div>
          </div>
          <div class="hb-stat-item">
            <div class="hb-stat-icon">📏</div>
            <div>
              <div class="hb-stat-label">연간 절감 거리 (차량 ${vehicles}대)</div>
              <div class="hb-stat-val">${Math.round(distSaved * monthTrips * 12 * vehicles).toLocaleString()} km</div>
            </div>
          </div>
        </div>
      </div>

      <!-- Footnote -->
      <div style="margin-top:16px;padding-top:14px;border-top:1px solid rgba(0,229,160,0.12);font-size:0.7rem;color:var(--muted);line-height:1.6">
        * 연비 절감률 <strong style="color:var(--text)">${pctSaved.toFixed(1)}%</strong>는 AI 최단경로 알고리즘 실제 계산값 · 편도 거리 기준 · 연비 ${fuelEff}km/L · 유가 ₩${fuelPrice.toLocaleString()}/L · 월 ${monthTrips}회 운행
      </div>
    </div>
  `;
  resultsArea.appendChild(sec3);

  // ═══════════════════════════════════════════════════════════
  // SECTION 4 · 차량 대수 슬라이더
  // ═══════════════════════════════════════════════════════════
  window._yearlySaving1  = yearly1v;
  window._monthlySaving1 = monthlySaving1;
  window._pctSaved       = pctSaved;
  window._distSaved      = distSaved;
  window._monthTrips     = monthTrips;

  const sec4 = document.createElement('div');
  sec4.style.animation = 'fadeUp 0.4s ease 0.3s both';
  sec4.innerHTML = `
    <div class="slider-box">
      <div class="slider-header">
        <div class="slider-title-row">
          <span class="slider-icon">🚛</span>
          <span class="slider-title">우리 회사 차량은 몇 대?</span>
        </div>
        <div class="slider-sub">슬라이더를 움직이면 절감액이 실시간으로 계산됩니다</div>
      </div>

      <div class="slider-track-wrap">
        <div class="slider-labels-top">
          <span>1대</span><span>10대</span><span>20대</span><span>30대</span><span>40대</span><span>50대</span>
        </div>
        <input type="range" id="vehicleSlider" class="vehicle-slider"
          min="1" max="50" value="${vehicles}" step="1">
        <div class="slider-thumb-label" id="sliderThumbLabel" style="left:${(vehicles-1)/49*100}%">
          ${vehicles}대
        </div>
      </div>

      <div class="slider-result" id="sliderResult">
        <div class="sr-left">
          <div class="sr-vehicle-count">차량 <span id="srVehicles">${vehicles}</span>대 기준</div>
          <div class="sr-arrow">→</div>
          <div class="sr-saving-wrap">
            <div class="sr-saving-label">연간 절감 예상</div>
            <div class="sr-saving-value" id="srYearly">${fmtWon(yearly1v * vehicles)}</div>
          </div>
        </div>
        <div class="sr-right">
          <div class="sr-stat">
            <div class="sr-stat-label">월 절감액</div>
            <div class="sr-stat-val" id="srMonthly">₩${Math.round(monthlySaving1 * vehicles).toLocaleString()}</div>
          </div>
          <div class="sr-divider"></div>
          <div class="sr-stat">
            <div class="sr-stat-label">5년 누적 절감</div>
            <div class="sr-stat-val" id="sr5year">${fmtWon(yearly1v * vehicles * 5)}</div>
          </div>
          <div class="sr-divider"></div>
          <div class="sr-stat">
            <div class="sr-stat-label">연료비 절감률</div>
            <div class="sr-stat-val" id="srPct">${pctSaved.toFixed(1)}%↓</div>
          </div>
        </div>
      </div>

      <div class="slider-bar-chart">
        <div class="sbc-label">차량 규모별 5년 누적 절감 비교</div>
        <div class="sbc-bars" id="sbcBars"></div>
      </div>
    </div>
  `;
  resultsArea.appendChild(sec4);

  buildBarChart(vehicles, yearly1v);

  const slider     = document.getElementById('vehicleSlider');
  const thumbLabel = document.getElementById('sliderThumbLabel');

  function updateSlider(v) {
    const y1  = window._yearlySaving1;
    const m1  = window._monthlySaving1;
    const pct = window._pctSaved;
    const pctPos = (v - 1) / 49 * 100;

    slider.style.background = `linear-gradient(to right, var(--accent) 0%, var(--accent) ${pctPos}%, var(--border) ${pctPos}%, var(--border) 100%)`;
    thumbLabel.style.left    = pctPos + '%';
    thumbLabel.textContent   = v + '대';

    document.getElementById('srVehicles').textContent = v;
    document.getElementById('srYearly').textContent   = fmtWon(y1 * v);
    document.getElementById('srMonthly').textContent  = '₩' + Math.round(m1 * v).toLocaleString();
    document.getElementById('sr5year').textContent    = fmtWon(y1 * v * 5);
    document.getElementById('srPct').textContent      = pct.toFixed(1) + '%↓';
    buildBarChart(v, y1);
  }

  updateSlider(vehicles);
  slider.addEventListener('input', () => updateSlider(parseInt(slider.value)));

  // Update header stats
  optimizationCount++;
  totalSaved += monthlySavingAll;
  document.getElementById('hTotalRoutes').textContent = optimizationCount;
  document.getElementById('hTotalSaved').textContent  = '₩' + Math.round(totalSaved / 10000) + '만';
}

// ── 금액 포맷: 억 단위 넘으면 억으로, 아니면 만원 ─────────────────────────
function fmtWon(v) {
  if (v >= 100000000) return '₩' + (v / 100000000).toFixed(2) + '억원';
  return '₩' + Math.round(v / 10000).toLocaleString() + '만원';
}

function buildBarChart(activeV, yearlySaving1) {
  const ticks = [1, 5, 10, 20, 30, 50];
  const bars = document.getElementById('sbcBars');
  if (!bars) return;
  const maxVal = yearlySaving1 * 50 * 5;   // 5년 기준으로 최대값 설정
  const closestActive = [...ticks].reverse().find(t => t <= activeV) || 1;
  bars.innerHTML = ticks.map(v => {
    const val       = yearlySaving1 * v * 5;  // 5년 누적
    const heightPct = maxVal > 0 ? (val / maxVal * 100) : 0;
    const highlight = (v === closestActive);
    const label     = val >= 100000000
      ? (val / 100000000).toFixed(1) + '억'
      : Math.round(val / 10000) + '만';
    return `
      <div class="sbc-col">
        <div class="sbc-val ${highlight ? 'active' : ''}">${label}</div>
        <div class="sbc-bar-wrap">
          <div class="sbc-bar ${highlight ? 'active' : ''}" style="height:${Math.max(4, heightPct)}%"></div>
        </div>
        <div class="sbc-tick ${highlight ? 'active' : ''}">${v}대</div>
      </div>
    `;
  }).join('');
}

// ─── Default: deliberately non-optimal west↔east zigzag ─────────────────────
// 기존 경로: 강서→해운대→부산신항→동래→감천→기장  (서↔동 교차 = 비효율)
// 최적 경로: 강서→신항→감천→북항→남구→동래→수영→해운대→기장 (지역별 묶음)
['강서구물류단지', '해운대물류센터', '부산신항', '동래구배송', '감천항', '기장군물류'].forEach(l => {
  selectedLocations.push(l);
});
renderList();
</script>
</body>
</html>
